<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Types</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #f0f4ff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  h1 {
    font-size: 2rem;
    font-weight: 800;
    color: #1e1e2e;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    color: #6b7280;
    font-size: 0.95rem;
    margin-bottom: 32px;
  }

  .add-form {
    display: flex;
    gap: 10px;
    margin-bottom: 32px;
  }

  .add-form input {
    padding: 12px 18px;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s;
    width: 220px;
  }

  .add-form input:focus { border-color: #6366f1; }

  .add-form button {
    padding: 12px 22px;
    background: #6366f1;
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .add-form button:hover { background: #4f46e5; }
  .add-form button:active { transform: scale(0.97); }
  .add-form button:disabled { background: #a5b4fc; cursor: not-allowed; }

  .page-info {
    font-size: 0.85rem;
    color: #6b7280;
    margin-bottom: 12px;
    text-align: center;
  }

  #cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 400px;
  }

  .card {
    text-decoration: none;
    background: white;
    border-radius: 16px;
    padding: 18px 24px;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
    opacity: 0;
    transform: translateY(10px);
    animation: pop 0.3s ease forwards;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(0,0,0,0.12);
  }

  .card .emoji { font-size: 2rem; line-height: 1; flex-shrink: 0; }

  .card .label {
    font-size: 1rem;
    font-weight: 700;
    color: #1e1e2e;
    text-transform: capitalize;
  }

  @keyframes pop { to { opacity: 1; transform: translateY(0); } }

  .pagination {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 20px;
  }

  .pagination button {
    padding: 8px 16px;
    border: 2px solid #e5e7eb;
    background: white;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: #1e1e2e;
    cursor: pointer;
    transition: all 0.2s;
  }

  .pagination button:hover:not(:disabled) {
    border-color: #6366f1;
    color: #6366f1;
  }

  .pagination button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .pagination .page-num {
    font-size: 0.9rem;
    font-weight: 700;
    color: #6b7280;
    min-width: 80px;
    text-align: center;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 4px solid #e5e7eb;
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: #fef2f2;
    border: 1px solid #fca5a5;
    color: #b91c1c;
    border-radius: 12px;
    padding: 16px 24px;
    font-size: 0.9rem;
    text-align: center;
    max-width: 400px;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1e1e2e;
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 0.95rem;
    transition: transform 0.3s ease;
    z-index: 999;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: #b91c1c; }
</style>
</head>
<body>

<h1>🐾 Pet Types</h1>
<p class="subtitle">Browse all available pet categories</p>

<div class="add-form">
  <input type="text" id="newPet" placeholder="e.g. hamster" maxlength="50" />
  <button id="addBtn" onclick="addPetType()">+ Add Pet</button>
</div>

<div class="page-info" id="pageInfo"></div>

<div id="cards">
  <div>
    <div class="spinner"></div>
    <p style="color:#6b7280;text-align:center">Loading pet types...</p>
  </div>
</div>

<div class="pagination" id="pagination" style="display:none">
  <button id="prevBtn" onclick="changePage(-1)">← Prev</button>
  <span class="page-num" id="pageNum"></span>
  <button id="nextBtn" onclick="changePage(1)">Next →</button>
</div>

<div class="toast" id="toast"></div>

<script>
  const ENDPOINT = 'https://maturewool-us.backendless.app/api/data/pets';
  const PAGE_SIZE = 5;

  let allPets = [];
  let currentPage = 1;

  const emojiMap = {
    cat: '🐱', dog: '🐶', bird: '🐦', fish: '🐠', rabbit: '🐰',
    hamster: '🐹', turtle: '🐢', snake: '🐍', lizard: '🦎',
    horse: '🐴', pig: '🐷', cow: '🐄', gorilla: '🦍', monkey: '🐒',
    parrot: '🦜', frog: '🐸', mouse: '🐭', bear: '🐻',
    duck: '🦆', chicken: '🐔', sheep: '🐑'
  };

  function getEmoji(name) {
    const key = name.toLowerCase();
    for (const [k, v] of Object.entries(emojiMap)) {
      if (key.includes(k)) return v;
    }
    return '🐾';
  }

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => { toast.className = 'toast'; }, 3000);
  }

  function renderPage() {
    const container = document.getElementById('cards');
    const totalPages = Math.ceil(allPets.length / PAGE_SIZE);
    const start = (currentPage - 1) * PAGE_SIZE;
    const pageItems = allPets.slice(start, start + PAGE_SIZE);

    container.innerHTML = '';
    pageItems.forEach((name, i) => {
      const card = document.createElement('a');
      card.className = 'card';
      card.style.animationDelay = (i * 60) + 'ms';
      card.href = 'https://www.google.com/search?q=' + encodeURIComponent(name + ' pet');
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      card.innerHTML = '<div class="emoji">' + getEmoji(name) + '</div><div class="label">' + name + '</div>';
      container.appendChild(card);
    });

    // Update pagination controls
    document.getElementById('pageInfo').textContent =
      'Showing ' + (start + 1) + '–' + Math.min(start + PAGE_SIZE, allPets.length) + ' of ' + allPets.length + ' pets';
    document.getElementById('pageNum').textContent = 'Page ' + currentPage + ' of ' + totalPages;
    document.getElementById('prevBtn').disabled = currentPage === 1;
    document.getElementById('nextBtn').disabled = currentPage === totalPages;
    document.getElementById('pagination').style.display = totalPages > 1 ? 'flex' : 'none';
  }

  function changePage(dir) {
    const totalPages = Math.ceil(allPets.length / PAGE_SIZE);
    currentPage = Math.max(1, Math.min(currentPage + dir, totalPages));
    renderPage();
  }

  async function loadPetTypes() {
    const container = document.getElementById('cards');
    try {
      const res = await fetch(ENDPOINT + '?pageSize=100&sortBy=created%20DESC');
      if (!res.ok) throw new Error('Server returned ' + res.status);
      const data = await res.json();

      allPets = data
        .map(item => typeof item === 'string' ? item.trim() : (item.type || '').trim())
        .filter(name => name.length >= 2 && /[a-zA-Z]/.test(name));

      if (allPets.length === 0) throw new Error('No valid pet types found.');

      currentPage = 1;
      renderPage();

    } catch (err) {
      container.innerHTML = '<div class="error-box"><strong>Failed to load pet types</strong><br><br>' + err.message + '</div>';
    }
  }

  async function addPetType() {
    const input = document.getElementById('newPet');
    const btn = document.getElementById('addBtn');
    const name = input.value.trim();

    if (!name) { showToast('Please enter a pet type.', true); return; }

    btn.disabled = true;
    btn.textContent = 'Adding...';

    try {
      const res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: name })
      });

      if (!res.ok) throw new Error('Server returned ' + res.status);

      input.value = '';
      showToast('🐾 ' + name + ' added!');
      await loadPetTypes();

    } catch (err) {
      showToast('Failed to add pet: ' + err.message, true);
    } finally {
      btn.disabled = false;
      btn.textContent = '+ Add Pet';
    }
  }

  document.getElementById('newPet').addEventListener('keydown', e => {
    if (e.key === 'Enter') addPetType();
  });

  loadPetTypes();
</script>
</body>
</html>
